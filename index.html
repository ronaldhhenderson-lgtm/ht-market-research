<html lang="en">
<head>

<title>Market Research</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a14;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.vault{text-align:center;padding:3rem 2rem;max-width:460px;width:90%}
.shield{font-size:4rem;margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(99,102,241,.4));animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.85}}
h1{font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.5rem;letter-spacing:-.02em}
.sub{font-size:.85rem;color:#888;margin-bottom:2rem;line-height:1.5}
.enc-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);border-radius:2rem;padding:.35rem 1rem;font-size:.7rem;color:#818cf8;margin-bottom:2rem;letter-spacing:.05em;text-transform:uppercase}
.enc-badge::before{content:'';width:6px;height:6px;background:#818cf8;border-radius:50%;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.input-wrap{position:relative;margin-bottom:1rem}
input{width:100%;padding:1rem 3.5rem 1rem 1.2rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:.75rem;color:#fff;font-size:1rem;outline:none;transition:all .3s}
input:focus{border-color:rgba(99,102,241,.5);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.eye{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#666;cursor:pointer;font-size:1.1rem;padding:.25rem}
.eye:hover{color:#aaa}
button.auth{width:100%;padding:1rem;background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:.75rem;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:.02em}
button.auth:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,.35)}
button.auth:active{transform:translateY(0)}
button.auth:disabled{opacity:.6;cursor:wait}
.err{color:#f87171;font-size:.8rem;margin-top:.75rem;min-height:1.2rem}
.progress{display:none;margin-top:1rem}
.progress.show{display:block}
.pbar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pfill{height:100%;width:0;background:linear-gradient(90deg,#6366f1,#818cf8);transition:width .3s}
.ptext{font-size:.7rem;color:#666;margin-top:.5rem}
.crypto-info{margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.06)}
.crypto-info p{font-size:.65rem;color:#555;line-height:1.6}
</style>
</head>

function b64decode(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}

function toggleEye(){var p=document.getElementById('pw');p.type=p.type==='password'?'text':'password'}

async function decrypt(){
var pw=document.getElementById('pw').value;
if(!pw){document.getElementById('err').textContent='Please enter password / 请输入密码';return}

var btn=document.getElementById('authBtn');
var prog=document.getElementById('progress');
var pfill=document.getElementById('pfill');
var ptext=document.getElementById('ptext');
var err=document.getElementById('err');

btn.disabled=true;
btn.textContent='Decrypting...';
err.textContent='';
prog.classList.add('show');
pfill.style.width='20%';
ptext.textContent='Deriving encryption key (PBKDF2 600K)...';

try{
// Decode payload
var salt=b64decode(SALT);
var iv=b64decode(IV);
var ct=b64decode(CT);

pfill.style.width='40%';

// Import password as key material
var keyMaterial=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);

pfill.style.width='50%';
ptext.textContent='Running 600,000 PBKDF2 iterations...';

// Derive AES-256-GCM key
var key=await crypto.subtle.deriveKey(
{name:'PBKDF2',salt:salt,iterations:600000,hash:'SHA-256'},
keyMaterial,
{name:'AES-GCM',length:256},
false,
['decrypt']
);

pfill.style.width='80%';
ptext.textContent='Decrypting content (AES-256-GCM)...';

// Decrypt
var decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
var html=new TextDecoder().decode(decrypted);

pfill.style.width='100%';
ptext.textContent='Success! Loading...';

// Replace entire document with decrypted HTML
setTimeout(function(){
document.open();
document.write(html);
document.close();
},300);

}catch(e){
btn.disabled=false;
btn.textContent='Decrypt & Access';
prog.classList.remove('show');
err.textContent='❌ Wrong password or corrupted data / 密码错误或数据损坏';
document.getElementById('pw').value='';
document.getElementById('pw').focus();
}
}

document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')decrypt()});
</script>
